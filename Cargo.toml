[package]
name = "bubblepolicy"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4", features = ["derive"] }
ratatui = "0.30"
crossterm = "0.27"
log = "0.4"
env_logger = "0.11"
color-eyre = "0.6.5"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
atty = "0.2.14"
nix = { version = "0.31.2", features = ["ptrace"] }
syscall-numbers = "4.0.2"

[profile.release]
strip = true
lto = true
codegen-units = 1
